services:
  postgres:
    image: postgres:16
    container_name: inventory_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d
      - ./infra/postgres/backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  frontend:
    build:
      context: ./app/frontend
    container_name: frontend
    restart: unless-stopped
    depends_on:
      gateway:
        condition: service_started
    networks:
      - edge

  gateway:
    build:
      context: ./app/gateway
    container_name: gateway
    restart: unless-stopped
    env_file:
      - ./app/gateway/.env
    depends_on:
      auth-service:
        condition: service_started
      orders-service:
        condition: service_started
      returns-service:
        condition: service_started
      warehouse-service:
        condition: service_started
      users-service:
        condition: service_started
    ports:
      - "${GATEWAY_PORT}:4000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - edge
      - internal

  auth-service:
    build:
      context: ./app/services/auth-service
    container_name: auth_service
    restart: unless-stopped
    env_file:
      - ./app/services/auth-service/.env
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "4001"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - internal

  orders-service:
    build:
      context: ./app/services/orders-service
    container_name: orders_service
    restart: unless-stopped
    env_file:
      - ./app/services/orders-service/.env
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "4002"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4002/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - internal

  returns-service:
    build:
      context: ./app/services/returns-service
    container_name: returns_service
    restart: unless-stopped
    env_file:
      - ./app/services/returns-service/.env
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "4003"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4003/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - internal

  warehouse-service:
    build:
      context: ./app/services/warehouse-service
    container_name: warehouse_service
    restart: unless-stopped
    env_file:
      - ./app/services/warehouse-service/.env
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "4004"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4004/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - internal

  users-service:
    build:
      context: ./app/services/users-service
    container_name: users_service
    restart: unless-stopped
    env_file:
      - ./app/services/users-service/.env
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "4005"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4005/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - internal

volumes:
  postgres_data:

networks:
  edge:
  internal:
    internal: true